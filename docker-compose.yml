services:
  user-service:
    image: golang:alpine
    working_dir: /app
    volumes:
      - ../studExE4-user-service:/app
    ports:
      - "9081:9081"
    environment:
      - USER_SERVICE_PORT=9081
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=studexdb_users
    command: go run cmd/server/main.go

  driver-service:
    image: golang:alpine
    working_dir: /app
    volumes:
      - ../studExE4-driver-service:/app
    ports:
      - "9082:9082"
    environment:
      - DRIVER_SERVICE_PORT=9082
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=studexdb_drivers
      - USER_SERVICE_URL=http://user-service:9081
    command: go run cmd/server/main.go
    depends_on:
      - user-service

  api-gateway:
    image: golang:alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "9080:9080"
    environment:
      - PORT=9080
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=studexdb
      - USER_SERVICE_URL=http://user-service:9081
      - DRIVER_SERVICE_URL=http://driver-service:9082
    command: go run cmd/main.go
    depends_on:
      - user-service
      - driver-service

  customer-bot:
    image: golang:latest
    working_dir: /app
    volumes:
      - ../studExE4-customer-bot:/app
    stdin_open: true
    tty: true
    environment:
      - API_GATEWAY_URL=http://api-gateway:9080
    command: go run cmd/main.go
    depends_on:
      - api-gateway
