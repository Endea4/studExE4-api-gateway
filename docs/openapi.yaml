openapi: "3.0.3"
info:
  title: API Gateway
  description: Entry point — proxies requests to user-service, driver-service, and trip-service
  version: "1.0.0"

servers:
  - url: http://localhost:9080
    description: Direct (api-gateway)

tags:
  - name: Gateway
    description: Health check

paths:
  /:
    get:
      tags: [Gateway]
      summary: Health check
      responses:
        "200":
          description: Gateway is running
          content:
            application/json:
              example:
                service: api-gateway
                status: running

  /users:
    any:
      tags: [Gateway]
      summary: Proxy → user-service
      description: All requests to /users/* are forwarded to user-service on port 9081.

  /drivers:
    any:
      tags: [Gateway]
      summary: Proxy → driver-service
      description: All requests to /drivers/* are forwarded to driver-service on port 9082.

  /admin:
    any:
      tags: [Gateway]
      summary: Proxy → driver-service
      description: All requests to /admin/* are forwarded to driver-service on port 9082.

  /orders:
    any:
      tags: [Gateway]
      summary: Proxy → trip-service
      description: All requests to /orders/* are forwarded to trip-service on port 9083.

  /callback:
    any:
      tags: [Gateway]
      summary: Proxy → customer-bot
      description: Internal callback routes forwarded to customer-bot on port 9084. Used by trip-service to notify the bot when a driver accepts an order.
